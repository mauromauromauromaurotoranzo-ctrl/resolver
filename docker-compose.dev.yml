version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: resolver-postgres-dev
    environment:
      POSTGRES_DB: resolver_db
      POSTGRES_USER: resolver_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resolver_dev_password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolver_user -d resolver_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend API (Development mode with hot reload)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: resolver-api-dev
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: resolver_db
      DB_USERNAME: resolver_user
      DB_PASSWORD: ${DB_PASSWORD:-resolver_dev_password}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      postgres:
        condition: service_healthy

  # Landing Page (Next.js Dev Mode)
  landing:
    image: node:20-alpine
    container_name: resolver-landing-dev
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    volumes:
      - ./apps/landing:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"

  # Backoffice Admin Panel (Vite Dev Mode)
  backoffice:
    image: node:20-alpine
    container_name: resolver-backoffice-dev
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: true
    volumes:
      - ./apps/backoffice:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_dev_data:
