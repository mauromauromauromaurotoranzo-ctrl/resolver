version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: resolver-postgres
    environment:
      POSTGRES_DB: resolver_db
      POSTGRES_USER: resolver_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resolver_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolver_user -d resolver_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: resolver-api
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: resolver_db
      DB_USERNAME: resolver_user
      DB_PASSWORD: ${DB_PASSWORD:-resolver_pass}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://resolver.tech}
    volumes:
      - ./apps/api:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
    ports:
      - "8000:80"
    depends_on:
      postgres:
        condition: service_healthy

  # Landing Page (Next.js)
  landing:
    build:
      context: ./apps/landing
      dockerfile: Dockerfile
    container_name: resolver-landing
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.resolver.tech}
      NODE_ENV: production
    ports:
      - "3000:3000"

  # Backoffice Admin Panel
  backoffice:
    build:
      context: ./apps/backoffice
      dockerfile: Dockerfile
    container_name: resolver-backoffice
    environment:
      VITE_API_URL: ${API_URL:-https://api.resolver.tech}
      NODE_ENV: production
    ports:
      - "3001:80"

volumes:
  postgres_data:
